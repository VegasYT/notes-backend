events {
    worker_connections 1024;
}

http {
    upstream app {
        server app:8000;
    }

    server {
        listen 80;

        server_name _;

        # Внутренний эндпоинт проверки сессии
        location = /api/auth/verify {
            internal;
            proxy_pass http://app/api/auth/verify;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header Cookie $http_cookie;
        }

        # Документация
        location ~ ^/(joqendo32jr923JIDWd2wkdw4|openapi.json) {
            proxy_pass http://app;
            proxy_set_header Host $host;
        }

        # Публичные auth-эндпоинты
        location ~ ^/api/v1/auth/(register|login)$ {
            proxy_pass http://app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Cookie $http_cookie;
        }

        # Защищённые эндпоинты
        location /api/v1/ {
            auth_request /api/auth/verify;
            error_page 401 = @unauthorized;

            proxy_pass http://app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Cookie $http_cookie;
        }

        # Админ-панель sqladmin
        location /admin {
            auth_request /api/auth/verify;
            error_page 401 = @unauthorized;

            proxy_pass http://app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Cookie $http_cookie;
        }

        # Обработчик неавторизованных запросов
        location @unauthorized {
            default_type application/json;
            return 401 '{"detail":"Not authenticated"}';
        }
    }
}
